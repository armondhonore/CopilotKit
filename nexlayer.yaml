application:
  name: copilotkit
  pods:
  - name: app
    image: ghcr.io/open-webui/open-webui:ollama
    path: /
    servicePorts:
    - 8080
    vars:
      WEBUI_SECRET_KEY: "copilotkit-nexlayer-secret-2024"
      WEBUI_AUTH: "False"
      OLLAMA_BASE_URL: ""
    volumes:
    - name: copilotkit-data
      mountPath: /app/backend/data
      size: 5Gi
